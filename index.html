<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Upload - Questões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Adicionar Nova Questão</h1>
        
        <form id="form-upload" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Matéria</label>
                    <input type="text" id="materia" placeholder="Ex: Geografia" class="w-full p-2 border rounded-md" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Assunto</label>
                    <input type="text" id="assunto" placeholder="Ex: Clima" class="w-full p-2 border rounded-md" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Enunciado da Questão</label>
                <textarea id="enunciado" rows="4" placeholder="Digite a pergunta aqui..." class="w-full p-2 border rounded-md" required></textarea>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700">Alternativas</label>
                <input type="text" id="alt_a" placeholder="Alternativa A" class="w-full p-2 border rounded-md" required>
                <input type="text" id="alt_b" placeholder="Alternativa B" class="w-full p-2 border rounded-md" required>
                <input type="text" id="alt_c" placeholder="Alternativa C" class="w-full p-2 border rounded-md" required>
                <input type="text" id="alt_d" placeholder="Alternativa D" class="w-full p-2 border rounded-md" required>
                <input type="text" id="alt_e" placeholder="Alternativa E" class="w-full p-2 border rounded-md" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Alternativa Correta</label>
                <select id="correta" class="w-full p-2 border rounded-md bg-white" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Explicação / Comentário da Resposta</label>
                <textarea id="explicacao" rows="3" placeholder="Por que esta alternativa está correta?" class="w-full p-2 border rounded-md" required></textarea>
            </div>

            <button type="submit" id="btn-enviar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-md transition shadow">
                Enviar Questão para o Banco
            </button>
        </form>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE (A URL geral e a sua chave real publicável)
        const SUPABASE_URL = "https://ykampvnnrkwvraxanunm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYW1wdm5ucmt3dnJheGFudW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTY1MzMsImV4cCI6MjA5Njg3MjUzM30.CScVluXVuZQ31zLWolNFLREz4mH-Cu-YGxlw6YrfeY8";

        // Mudamos o nome aqui para 'supabaseClient' para resolver o erro de SyntaxError
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('form-upload').addEventListener('submit', async (e) => {
            e.preventDefault();

            const botao = document.getElementById('btn-enviar');
            botao.innerText = "Enviando para o banco de dados...";
            botao.disabled = true;
            botao.className = "w-full bg-gray-400 text-white font-bold p-3 rounded-md cursor-not-allowed";

            // MAPEAMENTO EXATO IGUAL AS COLUNAS DO SEU PRINT DA TABELA
            const dadosQuestao = {
                materia: document.getElementById('materia').value,
                assunto: document.getElementById('assunto').value,
                enunciado: document.getElementById('enunciado').value,
                alternativa_a: document.getElementById('alt_a').value,
                alternativa_b: document.getElementById('alt_b').value,
                alternativa_c: document.getElementById('alt_c').value,
                alternativa_d: document.getElementById('alt_d').value,
                alternativa_e: document.getElementById('alt_e').value,
                correta: document.getElementById('correta').value,
                explicacao: document.getElementById('explicacao').value
            };

            try {
                // Envia para a tabela 'questoes' usando a conexão corrigida
                const { data, error } = await supabaseClient
                    .from('questoes')
                    .insert([dadosQuestao])
                    .select();

                if (error) throw error;

                alert('🚀 Questão enviada com sucesso!');
                document.getElementById('form-upload').reset();
            } catch (error) {
                console.error("Erro completo:", error);
                alert(
                    "❌ ERRO DO SUPABASE:\n\n" +
                    "Mensagem: " + (error.message || "Não especificada") + "\n" +
                    "Código: " + (error.code || "N/A") + "\n" +
                    "Detalhes: " + (error.details || "Sem detalhes adicionais")
                );
            } finally {
                botao.innerText = "Enviar Questão para o Banco";
                botao.disabled = false;
                botao.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-md transition shadow";
            }
        });
    </script>
</body>
</html>
